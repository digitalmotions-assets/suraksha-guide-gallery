<div class="sg-gallery">

    <!-- Title -->
    <div class="sg-title-area">
        <h1>Safety Image Gallery</h1>
        <p>Fire Safety, CCTV, Security, PPE, First Aid and Training Images</p>
    </div>

    <!-- Search -->
    <div class="sg-search">
        <input
            type="text"
            id="sg-search"
            placeholder="Search gallery..."
            autocomplete="off">
        <i class="bi bi-search"></i>
    </div>

    <!-- Categories -->
    <div id="sg-categories" class="sg-categories">

        <button class="sg-category active" data-category="All">All</button>

        <button class="sg-category" data-category="Fire Safety">Fire Safety</button>

        <button class="sg-category" data-category="Security">Security</button>

        <button class="sg-category" data-category="CCTV">CCTV</button>

        <button class="sg-category" data-category="PPE">PPE</button>

        <button class="sg-category" data-category="First Aid">First Aid</button>

        <button class="sg-category" data-category="Emergency">Emergency</button>

        <button class="sg-category" data-category="Access Control">Access Control</button>

    </div>

    <!-- Loader -->
    <div id="sg-loader" class="sg-loader">
        <div class="sg-spinner"></div>
    </div>

    <!-- Empty State -->
    <div id="sg-empty" class="sg-empty" style="display:none;">

        <i class="bi bi-images"></i>

        <h3>No Images Found</h3>

        <p>Please try another search or category.</p>

    </div>

    <!-- Gallery -->
    <div id="sg-gallery" class="sg-grid"></div>

    <!-- Load More -->
    <div class="sg-loadmore">

        <button id="sg-load-more">

            Load More Images

        </button>

    </div>

</div>

<!-- ===========================
     MODAL
=========================== -->

<div id="sg-modal" class="sg-modal">

    <div class="sg-modal-content">

        <button class="sg-close">&times;</button>

        <button class="sg-nav sg-prev">&#10094;</button>

        <button class="sg-nav sg-next">&#10095;</button>

        <img
            class="sg-modal-image"
            src=""
            alt="">

        <div class="sg-modal-body">

            <h2 class="sg-modal-title"></h2>

            <p class="sg-modal-desc"></p>

            <div class="sg-modal-actions">

                <button class="sg-btn sg-btn-primary">
                    Read Guide
                </button>

                <button class="sg-btn sg-btn-success">
                    Share
                </button>

                <button class="sg-btn sg-btn-light">
                    Download
                </button>

            </div>

        </div>

    </div>

</div>

<!-- Toast -->
<div class="sg-toast"></div>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/digitalmotions-assets/suraksha-guide/gallery/gallery.css">
