<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Suraksha Guide Gallery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="css/gallery.css">

</head>

<body>

<div class="container-fluid py-4">

<div class="row">

<div class="col-lg-12">

<h2 class="text-center fw-bold mb-4">

Security Learning Gallery

</h2>

</div>

</div>

<div class="row">

<div class="col-lg-12">

<div class="sg-search">

<input
id="gallerySearch"
type="text"
placeholder="Search Images...">

</div>

</div>

</div>

<div class="row">

<div class="col-lg-12">

<div
id="galleryCategories"
class="sg-categories">

</div>

</div>

</div>

<div class="row">

<div class="col-lg-12">

<div
id="galleryGrid"
class="sg-grid">

</div>

</div>

</div>

<div class="row mt-4">

<div class="col-lg-12 text-center">

<button
id="loadMoreBtn"
class="btn btn-success btn-lg">

Load More

</button>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/gallery.js"></script>

<script src="js/gallery-modal.js"></script>

<script src="js/gallery-search.js"></script>

<script src="js/gallery-filter.js"></script>

<script src="js/gallery-loadmore.js"></script>

<script src="js/gallery-share.js"></script>

<script src="js/gallery-bookmark.js"></script>

</body>

</html>
